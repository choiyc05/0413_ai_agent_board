services:
  board-db:
    image: mariadb:12.1.2
    container_name: board-db
    restart: always
    environment:
      - MARIADB_HOST=localhost
      - MARIADB_PORT=3306
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=board
      - TZ=Asia/Seoul
      - LC_ALL:en_US.UTF-8
    ports:
      - 3306:3306
    volumes:
      - board_db_data:/var/lib/mysql
      - ./db/initdb.d:/docker-entrypoint-initdb.d
    networks:
      - my_network

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    ports:
      - 8000:8000
    depends_on:
      - board-db
    volumes:
      - ./backend:/app
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      # MariaDB connection variables could be set here, but since the frontend uses localhost in dev 
      # we assume your backend connects to 'board-db' using DB settings inside settings.py.
      # Ex. DB_HOST=board-db
      - DB_HOST=board-db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=1234
      - DB_NAME=board
    networks:
      - my_network

  frontend:
    image: nginx:alpine
    container_name: frontend
    restart: always
    ports:
      - 80:80
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - my_network

volumes:
  board_db_data:
    driver: local

networks:
  my_network:
    driver: bridge