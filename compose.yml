services:
  board-db:
    image: mariadb:12.1.2
    container_name: board-db
    restart: always
    environment:
      - MARIADB_HOST=localhost
      - MARIADB_PORT=3306
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=board
      - TZ=Asia/Seoul
      - LC_ALL:en_US.UTF-8
      # # 일반 사용자 계정 (선택)
      # - MARIADB_USER: edu_user
      # - MARIADB_PASSWORD: 1234
    ports:
      - 3306:3306
    volumes:
      # [호스트 경로]:[컨테이너 내부 경로] 혹은 [볼륨 이름]:[경로]
      - board_db_data:/var/lib/mysql
      - ./db/initdb.d:/docker-entrypoint-initdb.d # ddl.sql 파일을 컨테이너 내부로 마운트하여 초기화 스크립트로 사용
    networks:
      - my_network

volumes:
  # 이름을 지정한 볼륨 (Docker가 내부적으로 관리하여 성능과 관리에 유리함)
  board_db_data:
    driver: local

networks:
  my_network:
    driver: bridge